    <style>
        * { font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }
        body { background: linear-gradient(135deg, #F8FAFC 0%, #FFFBF0 100%); overflow-x: hidden; line-height: 1.6; }
        
        /* Animated Background */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            opacity: 0.06;
        }
        .bg-slideshow img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: bgSlide 24s infinite;
        }
        .bg-slideshow img:nth-child(1) { animation-delay: 0s; }
        .bg-slideshow img:nth-child(2) { animation-delay: 6s; }
        .bg-slideshow img:nth-child(3) { animation-delay: 12s; }
        .bg-slideshow img:nth-child(4) { animation-delay: 18s; }
        
        @keyframes bgSlide {
            0%, 20% { opacity: 0.4; transform: scale(1); }
            25%, 45% { opacity: 0; transform: scale(1.1); }
            50%, 70% { opacity: 0.4; transform: scale(1); }
            75%, 95% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0.4; transform: scale(1); }
        }
        
        /* Particles */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .particle {
            position: absolute;
            background: linear-gradient(135deg, #1E88E5, #43A047);
            border-radius: 50%;
            opacity: 0.15;
            animation: floatParticle 20s infinite;
        }
        @keyframes floatParticle {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        /* Compact Top Bar */
        .compact-top-bar {
            background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(248,250,252,0.95));
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            border-bottom: 2px solid #E2E8F0;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .mini-select {
            background: linear-gradient(135deg, #F1F5F9, #E2E8F0);
            border: 1px solid #CBD5E1;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            outline: none;
            transition: all 0.3s;
            cursor: pointer;
            min-width: 130px;
        }
        .mini-select:hover { background: white; border-color: #1E88E5; box-shadow: 0 2px 8px rgba(30, 136, 229, 0.15); }
        .mini-select:focus { border-color: #1E88E5; background: white; }
        .mini-btn {
            background: linear-gradient(135deg, #1E88E5, #1565C0);
            color: white;
            padding: 6px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(30, 136, 229, 0.3);
        }
        .mini-btn:hover { background: linear-gradient(135deg, #1565C0, #0D47A1); transform: translateY(-2px); }
        .services-link {
            color: #D97706;
            font-weight: 800;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            padding: 6px 16px;
            border-radius: 8px;
            background: linear-gradient(135deg, #FFFBF0, #FFF3E0);
            border: 2px solid #FFB300;
        }
        .services-link:hover { color: #B45309; transform: translateX(-5px); box-shadow: 0 4px 12px rgba(255, 179, 0, 0.3); }
        
        /* Hero */
        .hero-bg {
            position: relative;
            min-height: 70vh;
            background: linear-gradient(135deg, rgba(30, 136, 229, 0.92), rgba(67, 160, 71, 0.88)),
                        url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        .hero-content { position: relative; z-index: 10; text-align: center; padding: 3rem 2rem; max-width: 900px; }
        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            text-shadow: 0 4px 30px rgba(0,0,0,0.3);
            animation: slideUp 1s ease-out;
            background: linear-gradient(135deg, #FFFFFF, #FFB300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-subtitle { font-size: clamp(1.2rem, 3vw, 1.8rem); margin-bottom: 2.5rem; opacity: 0.98; font-weight: 500; animation: slideUp 1s ease-out 0.2s backwards; }
        .hero-buttons { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; animation: slideUp 1s ease-out 0.4s backwards; }
        .hero-btn-primary {
            background: linear-gradient(135deg, #FFB300, #FF8F00);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s;
            box-shadow: 0 8px 30px rgba(255, 179, 0, 0.4);
        }
        .hero-btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(255, 179, 0, 0.5); }
        .hero-btn-secondary {
            background: white;
            color: #1E88E5;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s;
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.3);
        }
        .hero-btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(255, 255, 255, 0.4); }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Stats */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: -50px auto 0;
            padding: 0 2rem;
            position: relative;
            z-index: 20;
        }
        .stat-card {
            background: linear-gradient(135deg, white, #F8FAFC);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            border-bottom: 5px solid #1E88E5;
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-10px); box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .stat-icon { font-size: 2.5rem; margin-bottom: 1rem; color: #1E88E5; }
        .stat-number {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1E88E5, #43A047);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .stat-label { color: #64748B; font-weight: 700; font-size: 1.1rem; }
        
        /* Section Headers */
        .section-header { text-align: center; margin-bottom: 3.5rem; position: relative; }
        .section-header h2 {
            color: #1E293B;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 900;
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .section-header h2::after {
            content: '';
            position: absolute;
            bottom: -15px;
            right: 25%;
            width: 50%;
            height: 5px;
            background: linear-gradient(90deg, #1E88E5, #43A047, #FFB300);
            border-radius: 3px;
        }
        .section-header p { color: #64748B; font-size: 1.2rem; max-width: 700px; margin: 1.5rem auto 0; font-weight: 500; }
        
        /* Property Cards */
        .property-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #E2E8F0;
            position: relative;
        }
        .property-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #1E88E5, #43A047, #FFB300);
            transform: scaleX(0);
            transition: transform 0.4s;
        }
        .property-card:hover::before { transform: scaleX(1); }
        .property-card:hover { transform: translateY(-10px); box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .property-image { position: relative; height: 260px; overflow: hidden; background: #E2E8F0; }
        .property-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .property-card:hover .property-image img { transform: scale(1.1) rotate(1deg); }
        .property-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #FFB300, #FF8F00);
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 179, 0, 0.4);
            z-index: 10;
        }
        .property-type-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #1E88E5, #1565C0);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(30, 136, 229, 0.4);
            z-index: 10;
        }
        .price-badge {
            background: linear-gradient(135deg, #43A047, #2E7D32);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 1rem;
            box-shadow: 0 4px 15px rgba(67, 160, 71, 0.3);
        }
        .property-info { padding: 1.5rem; }
        .property-title { font-size: 1.4rem; font-weight: 800; color: #1E293B; margin-bottom: 1rem; }
        .property-details { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; color: #64748B; }
        .property-detail-item { display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; }
        .property-detail-item i { color: #1E88E5; width: 20px; }
        .wa-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            text-decoration: none;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .wa-btn:hover { background: linear-gradient(135deg, #128C7E, #075E54); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4); }
        
        /* Service Cards */
        .service-card {
            background: linear-gradient(135deg, white, #F8FAFC);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            border-right: 5px solid #1E88E5;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .service-card:hover { transform: translateY(-8px); box-shadow: 0 15px 50px rgba(0,0,0,0.12); border-right-color: #FFB300; }
        .service-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1E88E5, #64B5F6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 25px rgba(30, 136, 229, 0.3);
            transition: all 0.3s;
        }
        .service-card:hover .service-icon { transform: rotate(5deg) scale(1.1); }
        .service-title { font-size: 1.6rem; font-weight: 800; color: #1E293B; margin-bottom: 1rem; }
        .service-desc { color: #64748B; line-height: 1.8; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .service-desc strong { color: #1E88E5; }
        
        /* Floating WhatsApp */
        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; z-index: 999; animation: pulse-whatsapp 2s infinite; }
        @keyframes pulse-whatsapp {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 8px 30px rgba(37, 211, 102, 0.6); }
        }
        .whatsapp-float-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4);
            transition: all 0.3s;
        }
        .whatsapp-float-btn:hover { transform: scale(1.1); }
        
        /* Footer */
        .main-footer { background: linear-gradient(135deg, #1E293B, #0F172A); color: white; padding: 3rem 0 2rem; border-top: 5px solid #FFB300; }
        .footer-logo { font-size: 2rem; font-weight: 900; color: #FFB300; margin-bottom: 1rem; }
        .footer-text { color: #94A3B8; margin-bottom: 1.5rem; }
        .footer-social { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .social-link {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s;
        }
        .social-link:hover { background: #FFB300; transform: translateY(-5px); }
        .footer-copy { color: #64748B; font-size: 0.9rem; padding-top: 2rem; border-top: 1px solid #334155; }
        
        /* Section Backgrounds */
        .section-agricultural { background: linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 100%); }
        .section-farms { background: linear-gradient(135deg, #FFF8E1 0%, #FFF3E0 100%); }
        .section-residential { background: linear-gradient(135deg, #E3F2FD 0%, #E1F5FE 100%); }
        .section-services { background: linear-gradient(135deg, #FFFBF0 0%, #F8FAFC 100%); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .compact-top-bar { height: auto; padding: 10px 0; }
            .stats-container { grid-template-columns: 1fr 1fr; margin-top: -30px; gap: 1rem; }
            .hero-buttons { flex-direction: column; align-items: center; }
            .hero-btn-primary, .hero-btn-secondary { width: 100%; max-width: 300px; justify-content: center; }
        }
        
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #1E88E5, #43A047); border-radius: 6px; border: 3px solid #F1F5F9; }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-slideshow">
        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1920&q=80" alt="bg1">
        <img src="https://images.unsplash.com/photo-1479839672679-a46483c0e7c8?w=1920&q=80" alt="bg2">
        <img src="https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=1920&q=80" alt="bg3">
        <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1920&q=80" alt="bg4">
    </div>
    
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Top Bar -->
    <div class="compact-top-bar">
        <div class="container mx-auto px-4 flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-2 flex-1 flex-wrap">
                <i class="fas fa-filter text-primary text-sm ml-2"></i>
